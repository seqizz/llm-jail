name: Update flake inputs

on:
  schedule:
    - cron: "0 6 * * *" # daily at 06:00 UTC
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    outputs:
      pull-request-number: ${{ steps.create-pr.outputs.pull-request-number }}
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v7

      - uses: cachix/install-nix-action@v31

      - name: Update flake inputs
        run: |
          {
            nix flake update claude-code-nix
            nix flake update codex-cli-nix
            nix flake update llm-agents
            nix flake update autolith
          } 2>&1 | tee /tmp/update-output.txt
          {
            echo "UPDATE_OUTPUT<<EOF"
            cat /tmp/update-output.txt
            echo "EOF"
          } >> "$GITHUB_ENV"

      - name: Create pull request
        id: create-pr
        uses: peter-evans/create-pull-request@v8
        with:
          commit-message: |
            flake: update claude-code-nix, codex-cli-nix, llm-agents.nix, and autolith inputs

            ${{ env.UPDATE_OUTPUT }}
          title: "flake: update claude-code-nix, codex-cli-nix, llm-agents.nix, and autolith inputs"
          body: |
            Automated daily update of flake inputs:
            - `claude-code-nix`
            - `codex-cli-nix`
            - `llm-agents.nix`
            - `autolith`
          branch: auto-update-flake-inputs
          delete-branch: true

  smoke-test:
    needs: update
    if: needs.update.outputs.pull-request-number
    uses: ./.github/workflows/ci.yml
